# =============================================================================
# Deep MR Dev20 Strategy — MA20 -20% 폭락 평균회귀 (발굴 파이프라인 배치3 졸업)
#
# 검증: reports/discovery/gate_deep_mr_dev20.md (3배치 22변형 중 유일 품질 전관문 통과)
#   top300 · +51.8% / Sharpe 0.73 / MaxDD 16.2% / 거래당 그로스 +1.81% / 월 6.0회
#   부트스트랩 Sharpe p05 +0.218 · 워크포워드 8/11(최악 -4.8%) · 비용 30bp +39.5% ·
#   섭동(-16~-24%) 전부 양수 · OOS train 0.93/test 0.30. 빈도 월6회는 사장님 수용(2026-06-11).
# 사이징: S2(자본/K=종목당 200만) — dev20_sizing_scenarios.tsv 스위트스팟
#   (CAGR +14.2% / Sharpe 0.79 / P(DD≥30%)=11%). paper_investment_per_stock 가 실체결 사이징.
#
# 진입 (백테스트 룰 단일소스 scripts.discovery.rules.MeanReversionMA20Rule):
#   1. (종가-MA20)/MA20 ≤ -20% (깊은 폭락)
#   2. RSI(14) < 30 (과매도 확인)
# 청산 (백테스트 MAReversionExitAdapter 와 동일 우선순위):
#   sl -7% → tp +12% → MA20×0.9 회복 → 최대보유 7거래일
#
# ⚠️ 성격: 승률 49%·중앙값 -0.33%·우꼬리 의존(+17~49%) — "자주 조금 잃고 가끔 크게 먹는"
#   희소 저격형. 페이퍼 검증 포인트: 폭락주 익일 시가 실체결(하한가)·실측 슬리피지(한계 50bp).
# =============================================================================

strategy:
  name: "DeepMrDev20Strategy"
  version: "1.0.0"

paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터 (진입 — 백테스트 룰과 동일)
# -----------------------------------------------------------------------------
parameters:
  ma_period: 20
  entry_deviation_pct: -20.0    # (종가-MA20)/MA20 ≤ -20%
  rsi_period: 14
  rsi_oversold: 30
  # 신호 평가 최소 일봉 수 (MA20+RSI14 워밍업 + 여유)
  min_daily_bars: 35
  max_holding_days: 7

# -----------------------------------------------------------------------------
# 리스크 관리 (청산 — 게이트 검증값 1:1)
# -----------------------------------------------------------------------------
risk_management:
  stop_loss_pct: 0.07           # 손절 -7%
  take_profit_pct: 0.12         # 익절 +12%
  max_hold_days: 7              # 최대 보유 거래일
  recovery_ratio: 0.9           # 회복 청산: 종가 ≥ MA20 × 0.9
  max_positions: 5              # K=5 (게이트 측정 동일)
  max_daily_trades: 5
  # ★S2 사이징: 가상매매 실체결 종목당 금액 (virtual_trading_manager 소비, 자본/K=200만).
  #   미설정 전략은 기존 100만 기본값 유지 — 타 7전략 무영향.
  paper_investment_per_stock: 2000000
  max_per_stock_amount: 2000000  # recommended_qty 메타데이터용 (동일값 유지)

# -----------------------------------------------------------------------------
# 대상 종목 — 비우면 EOD 스크리너 후보 사용. 거래량 폴백 비허용(희소조건 전략).
# -----------------------------------------------------------------------------
target_stocks: []
