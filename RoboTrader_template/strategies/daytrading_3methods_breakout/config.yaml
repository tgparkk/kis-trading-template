# =============================================================================
# DayTrading 3Methods Breakout Strategy Configuration
# 유지윤 『데이트레이딩 3대 타법』 돌파 타법(전고점 거래량 동반 돌파) variant B 실전판
#   — 백테스트 검증값 1:1 반영
#
# backtest 2021~2026 top_volume:50 = 706T / +5.90% / Sharpe 0.17 / hit 46.7%
#   (책의 베스트 룰, variant B sl10/tp10/mh10 — 빠른 익절)
# 탐색·관찰용(약한 Sharpe) — 페이퍼로 거동 관찰 목적.
#
# 진입 (백테스트 rule=breakout_prev_high):
#   1. 종가 >= 직전 20봉 전고점 (현재봉 제외, 전고점 돌파)
#   2. 당일 거래량 >= 직전 20봉 평균 × 2.0 (거래량 동반 폭증)
#   3. 양봉 (close > open)
# 청산: tp +10% / sl -10% / max_hold 10거래일 (trailing 없음)
# =============================================================================

strategy:
  name: "DayTrading3MethodsBreakoutStrategy"
  version: "1.0.0"

# 안전장치: true면 실제 주문 없이 로깅만 (페이퍼 트레이딩 검증 단계)
paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터 (진입 — 백테스트 rules.py rule_breakout_prev_high와 동일)
# -----------------------------------------------------------------------------
parameters:
  # 신호 평가 최소 일봉 수 (rule: len(df) < high_window(20)+2 가드 + 여유)
  min_daily_bars: 25
  max_holding_days: 10

# -----------------------------------------------------------------------------
# 리스크 관리 (청산)
# -----------------------------------------------------------------------------
risk_management:
  take_profit_pct: 0.10       # 익절 +10% (variant B 빠른 익절)
  stop_loss_pct: 0.10         # 손절 -10%
  max_hold_days: 10           # 최대 보유 거래일 (주말/공휴일 제외)
  trail_ma: null              # trailing 미사용 (돌파 타법은 고정 손익절)
  max_positions: 5
  max_daily_trades: 5
  max_per_stock_amount: 3000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 대상 종목
# 비워두면 framework의 종목 선정 로직(거래량 상위 등)을 따름.
# accepts_volume_fallback=True (추세추종 진입 — 거래량 상위 풀과 정합)
# -----------------------------------------------------------------------------
target_stocks: []
