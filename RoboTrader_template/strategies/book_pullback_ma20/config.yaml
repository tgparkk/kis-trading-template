# =============================================================================
# Book Pullback MA20 Strategy Configuration
# 강창권 『단기 트레이딩의 정석』 A-07 실전판 — 백테스트 검증값 1:1 반영
#
# 진입 (백테스트 rule=daily_ma20_pullback):
#   1. 직전 30일 내 +25% 급등 이력
#   2. 종가가 20일선 위 (지지 유효: close >= ma20 × (1 - below_tol))
#   3. 마지막 봉 저가가 20일선 부근 터치 (±touch_tol)
#   4. 마지막 봉 양봉 (지지 반등)
# 청산 (A-07 variant): tp +10%(책 명시) / sl -8% / 20일선 trailing(수익 중) / max_hold 50거래일
# =============================================================================

strategy:
  name: "BookPullbackMa20Strategy"
  version: "1.0.0"

# 안전장치: true면 실제 주문 없이 로깅만 (페이퍼 트레이딩 검증 단계)
paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터 (진입 — 백테스트 rules_daily.py rule_daily_ma20_pullback와 동일)
# -----------------------------------------------------------------------------
parameters:
  # 신호 평가 최소 일봉 수 (rule: len(df) < max(ma20, surge_lookback30)+2 가드 + 여유)
  min_daily_bars: 35

# -----------------------------------------------------------------------------
# 리스크 관리 (청산 — A-07 variant)
# -----------------------------------------------------------------------------
risk_management:
  take_profit_pct: 0.10       # 익절 +10% (A-07 책 명시 유일 익절)
  stop_loss_pct: 0.08         # 손절 -8%
  max_hold_days: 50           # 최대 보유 거래일 (주말/공휴일 제외)
  trail_ma: 20                # 수익 중 종가가 20일선 하향 이탈 시 청산
  max_positions: 5
  max_daily_trades: 5
  max_per_stock_amount: 3000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 대상 종목
# 비워두면 framework의 종목 선정 로직(거래량 상위 등)을 따름.
# accepts_volume_fallback=True (추세추종 진입 — 거래량 상위 풀과 정합)
# -----------------------------------------------------------------------------
target_stocks: []
