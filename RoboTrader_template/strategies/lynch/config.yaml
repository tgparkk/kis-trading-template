# =============================================================================
# Lynch Strategy Configuration
# 피터 린치 PEG 기반 가치+성장 전략
# =============================================================================

strategy:
  name: "LynchStrategy"
  version: "1.0.0"

# 안전장치: true면 실제 주문 없이 로깅만
paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # PEG 상한 (PER / 영업이익성장률%)
  # 2026-05-14 임계값 완화: 0.3 → 1.3 (8영업일 후보 0건 해소)
  peg_max: 1.3

  # 영업이익 YoY 성장률 최소 기준 (%)
  # 2026-05-14 임계값 완화: 70.0 → 30.0 (8영업일 후보 0건 해소)
  op_income_growth_min: 30.0

  # 부채비율 상한 (%)
  debt_ratio_max: 200.0

  # ROE 하한 (%)
  roe_min: 5.0

  # RSI 과매도 기준
  rsi_period: 14
  rsi_oversold: 35

  # 최대 보유일 제한 (프레임워크 max_holding_days 표준 키)
  max_holding_days: 120

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_positions: 5
  take_profit_pct: 0.50       # 익절 +50%
  stop_loss_pct: 0.15         # 손절 -15%
  max_hold_days: 120          # 최대 보유일 (120거래일)
  max_daily_trades: 5
  max_daily_loss_pct: 0.05    # 일일 최대 손실률 (5%)
  max_per_stock_amount: 3000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
