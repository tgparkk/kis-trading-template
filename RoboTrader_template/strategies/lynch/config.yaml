# =============================================================================
# Lynch Strategy Configuration
# 피터 린치 PEG 기반 가치+성장 전략
# =============================================================================

strategy:
  name: "LynchStrategy"
  version: "1.0.0"

# 안전장치: true면 실제 주문 없이 로깅만
paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # PEG 상한 (PER / 영업이익성장률%)
  peg_max: 0.3

  # 영업이익 YoY 성장률 최소 기준 (%)
  op_income_growth_min: 70.0

  # 부채비율 상한 (%)
  debt_ratio_max: 200.0

  # ROE 하한 (%)
  roe_min: 5.0

  # RSI 과매도 기준
  rsi_period: 14
  rsi_oversold: 35

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_positions: 5
  take_profit_pct: 0.50       # 익절 +50%
  stop_loss_pct: 0.15         # 손절 -15%
  max_hold_days: 120          # 최대 보유일 (120거래일)
  max_daily_trades: 5
  max_daily_loss_pct: 5.0
  max_per_stock_amount: 3000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 데이터베이스
# -----------------------------------------------------------------------------
database:
  host: "172.23.208.1"
  port: 5433
  user: "postgres"
  dbname: "strategy_analysis"

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
