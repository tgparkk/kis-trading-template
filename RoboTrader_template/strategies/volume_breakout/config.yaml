# =============================================================================
# Volume Breakout Strategy Configuration
# 거래량 폭증 + 양봉 돌파 전략
# =============================================================================

strategy:
  name: "VolumeBreakoutStrategy"
  version: "1.0.0"

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 거래량 비교 기간 (평균 거래량 계산용)
  volume_avg_period: 20

  # 거래량 폭증 배수 (평균 대비 N배 이상)
  volume_multiplier: 10.0

  # 양봉 조건: 종가 > 시가 (기본 활성)
  require_bullish_candle: true

  # 최소 봉 크기 (시가 대비 종가 상승률, %)
  min_candle_body_pct: 1.0

  # 보유 기간 제한
  max_holding_days: 5

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_position_size: 0.08  # 보수적 (변동성 큰 종목)
  stop_loss_pct: 0.05      # 손절 5%
  take_profit_pct: 0.10    # 익절 10%
  max_daily_trades: 3

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
