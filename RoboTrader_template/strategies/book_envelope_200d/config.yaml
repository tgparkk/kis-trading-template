# =============================================================================
# Book Envelope 200d High Strategy Configuration
# 『트레이딩 전략서』(Book 19) — 200일 종가신고가 + Envelope(10,10) 상단 돌파
#   — 백테스트 정본(robotrader_quant) + OOS 홀드아웃 검증값 반영
#
# 정본 재측정(top_volume:50, 2021~2026, sl8/tp10/mh10 K5):
#   Sharpe 1.10 / +183% / MaxDD 15.4% / KOSPI 상회
# OOS 홀드아웃: train(2021~2024.6) Sharpe 1.20 + test(2024.7~2026.5) Sharpe 1.82
#   → cross-period 강건 확인된 유일 신규 엣지. 페이퍼 관찰용으로 추가.
#
# 진입 (백테스트 rule=envelope_200d_high, 책 원문 A~I verbatim 기본값):
#   A 200일 종가신고가  B Envelope(10,10) 상단 돌파  C 양봉  D 거래량 전일+100%
#   E 종가>이등분선  F 5일 거래대금 50억+  not G(갭7%)  not H(직전급등10%)  I 당일+3%
# 청산: tp +10% / sl -8% / max_hold 10거래일 (trailing 없음)
#
# ★진입 평가는 200영업일 필요 → 라이브 일봉 피드 부족분을 QuantDailyReader(quant)로 보강.
# =============================================================================

strategy:
  name: "BookEnvelope200dStrategy"
  version: "1.0.0"

paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터 (진입 — 백테스트 rules.py rule_envelope_200d_high 기본값 사용)
# -----------------------------------------------------------------------------
parameters:
  # 진입 룰 평가 최소 일봉 수 (quant df 내부 검증; rule: max(high_window=200,env,value)+2=202)
  min_daily_bars: 202
  # on_tick 게이트(전달 robotrader 일봉~85봉에 적용)는 작게 — 진입 평가는 quant 230봉 내부조회.
  # (이 값이 크면 on_tick 이 envelope 을 항상 스킵해 영영 미발사한다.)
  min_gate_bars: 5
  # 진입 평가용 quant 일봉 조회 봉 수 (200봉 + 여유)
  entry_lookback_bars: 230
  max_holding_days: 10

# -----------------------------------------------------------------------------
# 리스크 관리 (청산) — OOS 검증 config
# -----------------------------------------------------------------------------
risk_management:
  take_profit_pct: 0.10       # 익절 +10%
  stop_loss_pct: 0.08         # 손절 -8%
  max_hold_days: 10           # 최대 보유 거래일 (주말/공휴일 제외)
  max_positions: 5
  max_daily_trades: 5
  max_per_stock_amount: 3000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 대상 종목 — 비우면 framework 종목 선정(스크리너 후보) 사용
# -----------------------------------------------------------------------------
target_stocks: []
