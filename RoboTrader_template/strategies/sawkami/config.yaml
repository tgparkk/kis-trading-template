# =============================================================================
# Sawkami Strategy Configuration
# 사와카미 가치투자 전략
# =============================================================================

strategy:
  name: "SawkamiStrategy"
  version: "1.0.0"

# 안전장치: true면 실제 주문 없이 로깅만
paper_trading: true

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 영업이익 YoY 성장률 최소 기준 (%)
  op_income_growth_min: 30.0

  # 52주 고점 대비 하락률 기준 (%) — 음수
  high52w_drop_pct: -20.0

  # 52주 고점 계산 기간 (거래일 수)
  high52w_period: 252

  # PBR 상한
  pbr_max: 1.5

  # 거래량 급증 배수 (20일 평균 대비)
  volume_ratio_min: 1.5
  volume_ma_period: 20

  # RSI 과매도 기준
  rsi_period: 14
  rsi_oversold: 30

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_positions: 10          # 최대 보유 종목 수
  max_position_size: 0.10    # 종목당 최대 비중
  take_profit_pct: 0.15      # 익절 +15%
  stop_loss_pct: 0.15        # 손절 -15%
  max_hold_days: 40          # 최대 보유일 (약 2개월)
  max_daily_trades: 5
  max_positions: 10          # 최대 보유 종목 수
  max_daily_loss_pct: 5.0    # 일일 최대 손실률 (%)
  max_per_stock_amount: 5000000  # 종목당 최대 투자금액 (원)

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
