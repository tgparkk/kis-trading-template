# =============================================================================
# Sample Strategy Configuration
# 이동평균 크로스 + RSI 복합 전략
# =============================================================================

strategy:
  name: "SampleStrategy"
  version: "1.0.0"

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 이동평균 기간
  ma_short_period: 5       # 단기 이동평균 (일)
  ma_long_period: 20       # 장기 이동평균 (일)

  # RSI 설정
  rsi_period: 14           # RSI 계산 기간
  rsi_oversold: 30         # 과매도 기준선
  rsi_overbought: 70       # 과매수 기준선

  # 거래량 설정
  volume_multiplier: 1.5   # 평균 대비 N배 이상이면 급증 판단

  # 매수 신호 최소 충족 조건 수 (1~3)
  min_buy_signals: 1

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_position_size: 0.10  # 종목당 최대 포트폴리오 비율 (10%)
  stop_loss_pct: 0.05      # 손절 비율 (5%)
  take_profit_pct: 0.10    # 익절 비율 (10%)
  max_daily_trades: 5      # 일일 최대 거래 횟수

# -----------------------------------------------------------------------------
# 대상 종목 (generate_signal에 전달되는 종목 코드 목록)
# 비워두면 framework의 종목 선정 로직을 따릅니다.
# -----------------------------------------------------------------------------
target_stocks: []
  # 예시:
  # - "005930"  # 삼성전자
  # - "000660"  # SK하이닉스
  # - "035420"  # NAVER
