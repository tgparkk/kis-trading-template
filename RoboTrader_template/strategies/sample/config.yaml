# =============================================================================
# Sample Strategy Configuration
# 이동평균 크로스 + RSI 복합 전략
# =============================================================================

strategy:
  name: "SampleStrategy"
  version: "1.0.0"

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 이동평균 기간
  ma_short_period: 5       # 단기 이동평균 (일)
  ma_long_period: 20       # 장기 이동평균 (일)

  # RSI 설정
  rsi_period: 14           # RSI 계산 기간
  rsi_oversold: 40         # 과매도 기준선 (조건2: RSI < 이 값이면 매수 신호)
  rsi_overbought: 70       # 과매수 기준선 (매도 신호)
  rsi_entry_max: 60        # MA 상승 추세 진입 상한 (RSI >= 이 값이면 과열로 조건1 차단)

  # 거래량 설정
  volume_multiplier: 1.5   # 평균 대비 N배 이상이면 급증 판단

  # 매수 신호 최소 충족 조건 수 (1~3)
  min_buy_signals: 1

  # 장 초반 진입 제한 (분): 09:00~09:N분 사이 신규 매수 보류
  market_open_skip_minutes: 5

  # [옵션 D-C 2026-05-14] 09:05~09:08 진입 차단 윈도우
  # scientist 분석: 해당 시간대 매수 승률 17% (n=6) — 회피 목적
  # 09:00 시가 진입(승률 47%)은 유지, 09:08 이후 진입 허용
  # block_start_min >= block_end_min이면 윈도우 비활성
  entry_block_window_start_min: 5  # 09:05:00 부터
  entry_block_window_end_min: 8    # 09:08:00 미만까지 차단

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_position_size: 0.10  # 종목당 최대 포트폴리오 비율 (10%)
  stop_loss_pct: 0.05      # 손절 비율 (5%)
  take_profit_pct: 0.10    # 익절 비율 (10%)
  max_daily_trades: 5      # 일일 최대 거래 횟수

# -----------------------------------------------------------------------------
# 대상 종목 (generate_signal에 전달되는 종목 코드 목록)
# 비워두면 framework의 종목 선정 로직을 따릅니다.
# -----------------------------------------------------------------------------
target_stocks: []
  # 예시:
  # - "005930"  # 삼성전자
  # - "000660"  # SK하이닉스
  # - "035420"  # NAVER
