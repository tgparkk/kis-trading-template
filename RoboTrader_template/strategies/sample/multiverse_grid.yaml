# SampleStrategy 파라미터 최적화 그리드 (매수 필터 탐색 전용, 2026-05-01)
# MultiverseEngine이 add_param()으로 순회할 값 목록
# 점(.) 구분 경로: config.yaml의 중첩 구조를 따름
#
# [매수 필터 그리드] 조합 수 = 3 × 4 × 3 × 3 × 3 = 324
#   min_buy_signals: 3개 값
#   rsi_oversold:    4개 값
#   volume_multiplier: 3개 값
#   ma_short_period: 3개 값
#   stop_loss_pct:   3개 값
# (ma_long_period=20, take_profit_pct=0.10 고정 — 매수 필터 외 변수 통제)

parameters.min_buy_signals: [1, 2, 3]
parameters.rsi_oversold: [30, 35, 40, 45]
parameters.volume_multiplier: [1.0, 1.5, 2.0]
parameters.ma_short_period: [3, 5, 10]
risk_management.stop_loss_pct: [0.03, 0.05, 0.07]
