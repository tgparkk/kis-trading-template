strategy:
  name: bull_flag
  version: 1.0.0
  description: "강세 깃발 패턴(폴 + 통합) 분봉 진입"

parameters:
  pole_min_pct: 0.03           # 폴(급등) 최소 상승률 (3%)
  consolidation_bars: 5        # 통합 구간 봉 수
  consolidation_max_pct: 0.015 # 통합 구간 최대 변동률 (1.5%)

risk_management:
  stop_loss_pct: 0.01        # 손절 1%
  take_profit_pct: 0.02      # 익절 2%
  max_holding_minutes: null  # 보유 시간 제한 없음
  eod_cutoff_buy: "15:00"    # 이후 신규 매수 차단
