# =============================================================================
# Mean Reversion Strategy Configuration
# MA20 이탈 평균회귀 전략
# =============================================================================

strategy:
  name: "MeanReversionStrategy"
  version: "1.0.0"

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 이동평균 기간
  ma_period: 20

  # 매수 진입 조건: MA 대비 이탈률 (%) — 음수값
  entry_deviation_pct: -10.0

  # 매도 조건: MA 복귀 비율 (MA까지 얼마나 회복하면 매도, 0~1)
  # 1.0 = MA 완전 복귀, 0.5 = 이탈 거리의 절반 회복
  exit_recovery_ratio: 0.9

  # RSI 과매도 확인 (추가 필터)
  use_rsi_filter: true
  rsi_period: 14
  rsi_oversold: 30

  # 최대 보유일 제한 (프레임워크 max_holding_days 표준 키)
  max_holding_days: 7

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_position_size: 0.10
  stop_loss_pct: 0.07      # 손절 7% (이미 -10% 이탈에서 진입하므로 넓게)
  take_profit_pct: 0.12    # 익절 12%
  max_daily_trades: 5

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
