# =============================================================================
# Momentum Strategy Configuration
# 5일 연속 상승 모멘텀 전략
# =============================================================================

strategy:
  name: "MomentumStrategy"
  version: "1.0.0"

# -----------------------------------------------------------------------------
# 전략 파라미터
# -----------------------------------------------------------------------------
parameters:
  # 연속 상승일 수 (이 일수 이상 연속 상승하면 매수)
  consecutive_up_days: 5

  # 최소 상승률 (각 일의 종가 대비 전일 종가, %)
  min_daily_change_pct: 0.0

  # 최소 누적 상승률 (5일간 총 상승률, %)
  min_total_change_pct: 3.0

  # 최대 보유일 제한 (프레임워크 max_holding_days 표준 키 — PositionMonitor/BacktestEngine 자동 트리거)
  max_holding_days: 10

# -----------------------------------------------------------------------------
# 리스크 관리
# -----------------------------------------------------------------------------
risk_management:
  max_position_size: 0.10  # 종목당 최대 포트폴리오 비율 (10%)
  stop_loss_pct: 0.05      # 손절 비율 (5%)
  take_profit_pct: 0.10    # 익절 비율 (10%)
  max_daily_trades: 5      # 일일 최대 거래 횟수

# -----------------------------------------------------------------------------
# 대상 종목
# -----------------------------------------------------------------------------
target_stocks: []
